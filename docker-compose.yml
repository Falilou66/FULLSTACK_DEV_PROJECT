# SamaBank — Infrastructure locale (conteneurs)
# PostgreSQL partagé par tous les microservices + Mailpit pour les emails de test
#
# Démarrage : docker compose up -d
# Arrêt     : docker compose down
# Logs      : docker compose logs -f postgres
# Reset DB  : docker compose down -v  (supprime aussi le volume)

services:

  # ─────────────────────────────────────────
  # Base de données PostgreSQL (partagée)
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: samabank-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: samabank
      POSTGRES_USER: samabank
      POSTGRES_PASSWORD: samabank2025
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - samabank_postgres_data:/var/lib/postgresql/data
    networks:
      - samabank-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U samabank -d samabank"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─────────────────────────────────────────
  # Mailpit — serveur SMTP de test
  # SMTP  : localhost:1025
  # UI web: http://localhost:8025
  # ─────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: samabank-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP (utilisé par auth-service et notification-service)
      - "8025:8025"   # Interface web de consultation des emails
    networks:
      - samabank-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/api/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 3

# ─────────────────────────────────────────
# Volumes persistants
# ─────────────────────────────────────────
volumes:
  samabank_postgres_data:
    name: samabank_postgres_data

# ─────────────────────────────────────────
# Réseau interne
# ─────────────────────────────────────────
networks:
  samabank-net:
    name: samabank-net
    driver: bridge
