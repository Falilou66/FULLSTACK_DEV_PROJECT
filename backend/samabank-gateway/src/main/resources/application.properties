spring.application.name=samabank-gateway
server.port=8080
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://samabank-auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://samabank-auth-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/users/**

spring.cloud.gateway.routes[2].id=customer-service
spring.cloud.gateway.routes[2].uri=lb://samabank-customer-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/customers/**

spring.cloud.gateway.routes[3].id=account-service
spring.cloud.gateway.routes[3].uri=lb://samabank-account-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/accounts/**

spring.cloud.gateway.routes[4].id=transaction-service
spring.cloud.gateway.routes[4].uri=lb://samabank-transaction-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/transactions/**

spring.cloud.gateway.routes[5].id=audit-service
spring.cloud.gateway.routes[5].uri=lb://samabank-audit-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/audit/**

spring.cloud.gateway.routes[6].id=stats-service
spring.cloud.gateway.routes[6].uri=lb://samabank-stats-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v1/stats/**

management.endpoints.web.exposure.include=health,info
